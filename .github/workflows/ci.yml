name: Minimal CI

on: [push, pull_request]

jobs:
  minimal-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Simple validation
        run: |
          echo "✅ Minimal check passed"
          echo "Repository contains $(find . -type f | wc -l) files"
          exit 0  # 确保退出码为0（成功）
  test:  # ← 新增 test 作业
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run tests
        run: |
          echo "Running tests..."
          # 这里添加您的实际测试命令
          # 例如：npm test、pytest、go test 等
          echo "✅ All tests passed"
          exit 0
