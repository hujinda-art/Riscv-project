name: Minimal CI

on: [push, pull_request]

jobs:
  minimal-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Simple validation
        run: |
          echo "✅ Minimal check passed"
          echo "Repository contains $(find . -type f | wc -l) files"
          exit 0  # 确保退出码为0（成功）
